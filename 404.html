<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Chris Woodland</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .error-section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--carbon);
      text-align: center;
      padding: 48px 24px;
    }
    .error-inner {
      max-width: 520px;
    }
    .error-code {
      font-family: var(--font-heading);
      font-weight: 900;
      font-size: clamp(6rem, 20vw, 12rem);
      line-height: 1;
      color: var(--cyan);
      letter-spacing: -0.04em;
      margin: 0 0 8px;
    }
    .error-title {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: clamp(1.4rem, 3vw, 2rem);
      color: var(--cream);
      margin: 0 0 20px;
      letter-spacing: -0.02em;
    }
    .error-body {
      font-family: var(--font-body);
      font-size: 1.05rem;
      line-height: 1.7;
      color: rgba(255, 235, 198, 0.65);
      margin: 0 0 40px;
    }
    .error-links {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>

  <nav class="nav" role="navigation" aria-label="Main navigation">
    <a href="index.html" class="nav-logo">C<span>W</span></a>
    <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="work.html">Work</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html" class="nav-cta"><span>Contact</span></a></li>
    </ul>
  </nav>

  <section class="error-section">
    <div class="error-inner">
      <p class="error-code">404</p>
      <h1 class="error-title">This page doesn't exist.</h1>
      <p class="error-body">
        Looks like this cut ended up on the floor. Head back and find what you're looking for.
      </p>
      <div class="error-links">
        <a href="index.html" class="btn btn-primary">Back to Home &nbsp;→</a>
        <a href="work.html" class="btn btn-outline-light">See My Work</a>
      </div>
    </div>
  </section>

  <script src="js/main.js"></script>
</body>
</html>
